# Quality gates for the HVAC Vent Optimizer custom integration.
#
# Established in Task 2.2 of the hvac-vent-balancing spec (Requirements 20.3,
# 20.4, 20.6). Runs the same four gates as the local pre-commit hook + test
# command: ruff (lint), black (format check), mypy (types), and pytest.
#
# Scope / baseline note (see docs/quality-baseline.md):
#   The repo carries a recorded baseline of pre-existing lint/type findings
#   (ruff 104, mypy package-scope 24, black 27 files). The measurable bar is
#   "no NET increase" with a downward trend (R20.4) — NOT zero from day one.
#   So the lint/type/format steps run in REPORT mode (continue-on-error) and
#   surface their counts in the job log, while `pytest` is a HARD gate that
#   must stay green (baseline: 98 passed / 0 failed). Once later tasks drive
#   the counts down (Task 28 enforces the baseline), flip the
#   `continue-on-error` flags below to make ruff/black/mypy blocking too.
#
# The working-copy ROOT is the package (Home Assistant loads it as
# custom_components.hvac_vent_optimizer); there is no nested custom_components/
# directory, so all gates run from the repository root.

name: Quality

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: ruff / black / mypy / pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 3.13 aligns with the lint/format target floor (py313) and the mypy
          # python_version in pyproject.toml. The runtime tracks HA Core's
          # interpreter; the tools run unchanged here.
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      # --- Lint / format / type gates (report-only against the baseline) ---
      - name: Ruff (lint)
        continue-on-error: true
        run: ruff check .

      - name: Black (format check)
        continue-on-error: true
        run: black --check .

      - name: Mypy (types — package scope, excludes tests like pre-commit)
        continue-on-error: true
        run: mypy . --exclude '^tests/'

      # --- Hard gate: the test suite must stay green ---
      - name: Pytest
        run: pytest
